<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Pages | PhrankleenTM</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li class="logo">
            <img src="./images/logo.png" alt="" />
          </li>
          <a href="./index.html"
            ><li class="back">
              <i class="fa-solid fa-arrow-left"></i>
              <p>Back</p>
            </li>
          </a>
        </ul>
      </nav>
    </header>

    <div class="container">
      <div class="landingPage landingPage-one">
        <div class="landing-card">
          <div class="writing">
            <p class="inside-p">Landing Page 1</p>
          </div>
          <i class="fa-solid fa-location-arrow inside-icon"></i>
        </div>
      </div>

      <div class="landingPage landingPage-two">
        <div class="landing-card">
          <div class="writing">
            <p class="inside-p">Landing Page 2</p>
          </div>
          <i class="fa-solid fa-location-arrow inside-icon"></i>
        </div>
      </div>

      <div class="landingPage landingPage-three">
        <div class="landing-card">
          <div class="writing">
            <p class="inside-p">Landing Page 3</p>
          </div>
          <i class="fa-solid fa-location-arrow inside-icon"></i>
        </div>
      </div>
    </div>
